services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS}
      XAI_API_KEY: ${XAI_API_KEY}
      XAI_MODEL: ${XAI_MODEL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
    command: >
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      -w ${GUNICORN_WORKERS}
      --timeout ${GUNICORN_TIMEOUT}
      -b 0.0.0.0:8000
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      default:
        priority: 100
      gateway:
        priority: 0
        aliases:
          - quiz10-backend

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${API_BASE_PATH}
        VITE_APP_BASE: ${APP_BASE_PATH}/
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      default:
        priority: 100
      gateway:
        priority: 0
        aliases:
          - quiz10-frontend

  admin:
    build:
      context: ./admin
      args:
        VITE_API_BASE: ${API_BASE_PATH}
        VITE_ADMIN_BASE: ${ADMIN_BASE_PATH}/
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      default:
        priority: 100
      gateway:
        priority: 0
        aliases:
          - quiz10-admin

  nginx:
    build:
      context: ./nginx
    profiles: ["local-gateway"]
    restart: unless-stopped
    environment:
      APP_BASE_PATH: ${APP_BASE_PATH}
      ADMIN_BASE_PATH: ${ADMIN_BASE_PATH}
      API_BASE_PATH: ${API_BASE_PATH}
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
      admin:
        condition: service_started

volumes:
  postgres_data:

networks:
  gateway:
    name: ${GATEWAY_NETWORK:-gateway-net}
    external: true

services:
  backend:
    environment:
      CORS_ORIGINS: http://127.0.0.1:3004,http://localhost:3004,http://127.0.0.1:3005,http://localhost:3005
    ports:
      - "127.0.0.1:8001:8000"

  frontend:
    build:
      args:
        VITE_API_BASE: /api
        VITE_APP_BASE: /app/

  admin:
    build:
      args:
        VITE_API_BASE: /api
        VITE_ADMIN_BASE: /admin/

  nginx:
    ports:
      - "127.0.0.1:3004:80"
